name: ScoutMobile
options:
  bundleIdPrefix: com.scout
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: false
targets:
  ScoutMobile:
    type: application
    platform: iOS
    sources:
      - ScoutMobile
    info:
      path: ScoutMobile/Info.plist
      properties:
        CFBundleDisplayName: Scout
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.scout.mobile.refresh
        LSApplicationQueriesSchemes:
          - linear
          - slack
          - github
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scout.mobile
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ScoutMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScoutMobileTests
        excludes:
          - "Fixtures/**"
      - path: ScoutMobileTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: ScoutMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scout.mobile.tests
  ScoutMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ScoutMobileUITests
    dependencies:
      - target: ScoutMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scout.mobile.uitests
        TEST_TARGET_NAME: ScoutMobile
schemes:
  ScoutMobile:
    build:
      targets:
        ScoutMobile: all
        ScoutMobileTests: [test]
        ScoutMobileUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScoutMobileTests
        - ScoutMobileUITests
      environmentVariables:
        - variable: SCOUT_VAULT_PATH
          value: /tmp/scout-vault-test
          isEnabled: false
